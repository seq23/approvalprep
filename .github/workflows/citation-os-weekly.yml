name: Citation OS Weekly

on:
  workflow_dispatch:
    inputs:
      fixture_trace:
        description: "Manual fixture trace only; not production telemetry proof"
        required: false
        default: "true"
  schedule:
    - cron: "17 12 * * 1"

permissions:
  contents: write

jobs:
  citation-os-weekly:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm run citation-os:weekly
        env:
          RUN_MODE: dry_run
          APPROVALPREP_SITE_URL: https://approvalprep.com
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
          BING_WEBMASTER_API_URL: ${{ secrets.BING_WEBMASTER_API_URL }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Commit citation OS weekly outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intelligence/*.json data/seo/*.json data/metrics/*.json data/citations/*.json data/backlink_handoff/* data/governance/*.json data/reports/*.json data/repurposing/*.json public/downloads/free-checklists/* data/content/*.json data/routes/*.json data/atoms/*.json data/atlas/*.json data/workflow_traces/*.json data/experiments/*.json data/self_healing/*.json data/locations/*.json data/validation/*.json public/sitemap.xml
          git diff --cached --quiet || git commit -m "chore(citation-os): weekly intelligence and lifecycle refresh"
          git push
