name: Release Report
on:
  workflow_dispatch:
    inputs:
      fixture_trace:
        description: "Run fixture workflow data trace only"
        required: false
        default: "false"
jobs:
  report:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - name: Run fixture workflow trace
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fixture_trace == 'true' }}
        run: npm run workflows:trace -- --workflow release-report.yml
      - run: echo "Release ledger and proof matrix are repo-native JSON artifacts."
