name: Admin Manifest Check
on:
  workflow_dispatch:
    inputs:
      fixture_trace:
        description: "Run fixture workflow data trace only"
        required: false
        default: "false"
  pull_request:
    paths: ["data/admin/**", "data/routes/**"]
jobs:
  admin:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22.12.0 }
      - name: Run fixture workflow trace
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fixture_trace == 'true' }}
        run: npm run workflows:trace -- --workflow admin-manifest-check.yml
      - run: npm run validate:admin

      - name: Build admin action index
        run: npm run admin:build-index
      - name: Validate admin action links
        run: npm run validate:admin-action-links
